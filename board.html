<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board | SMART BUG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">🐛</span>
                    <span class="logo-text">SMART BUG</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">📊 Dashboard</a>
                <a href="report.html" class="nav-item">➕ Report Bug</a>
                <a href="board.html" class="nav-item active">📋 Board</a>
                <a href="list.html" class="nav-item">📝 All Issues</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-menu">
                    <div class="user-avatar">👤</div>
                    <div class="user-info">
                        <span class="user-name">Demo User</span>
                        <span class="user-role">Tester</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <div class="header-left">
                    <h1 class="page-title">Kanban Board</h1>
                    <p class="page-subtitle">Drag and drop to update status</p>
                </div>
            </header>

            <div class="board-container">
                <div class="board-column">
                    <div class="column-header">
                        <h3>🐛 Open</h3>
                        <span class="column-count" id="openCount">0</span>
                    </div>
                    <div class="column-cards" id="openColumn"></div>
                </div>
                <div class="board-column">
                    <div class="column-header">
                        <h3>⚙️ In Progress</h3>
                        <span class="column-count" id="progressCount">0</span>
                    </div>
                    <div class="column-cards" id="progressColumn"></div>
                </div>
                <div class="board-column">
                    <div class="column-header">
                        <h3>✅ Resolved</h3>
                        <span class="column-count" id="resolvedCount">0</span>
                    </div>
                    <div class="column-cards" id="resolvedColumn"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/data.js"></script>
    <script src="js/board.js"></script>
</body>
</html>
