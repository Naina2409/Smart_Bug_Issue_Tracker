<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Bug | SMART BUG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main App Container - This was missing! -->
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">🐛</span>
                    <span class="logo-text">SMART BUG</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">📊 Dashboard</a>
                <a href="report.html" class="nav-item active">➕ Report Bug</a>
                <a href="board.html" class="nav-item">📋 Board</a>
                <a href="list.html" class="nav-item">📝 All Issues</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-menu">
                    <div class="user-avatar">👤</div>
                    <div class="user-info">
                        <span class="user-name">Demo User</span>
                        <span class="user-role">Tester</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <div class="header-left">
                    <h1 class="page-title">Report New Bug</h1>
                    <p class="page-subtitle">Create a detailed bug report</p>
                </div>
            </header>

            <!-- Form Container -->
            <div class="form-container">
                <form id="bugForm" class="bug-form">
                    <div class="form-group">
                        <label for="title">Bug Title *</label>
                        <input type="text" id="title" name="title" required placeholder="e.g., Login button not responding">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="priority">Priority *</label>
                            <select id="priority" name="priority" required>
                                <option value="critical">🔴 Critical</option>
                                <option value="high">🟠 High</option>
                                <option value="medium">🟡 Medium</option>
                                <option value="low">🟢 Low</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="status">Status</label>
                            <select id="status" name="status">
                                <option value="open">Open</option>
                                <option value="in-progress">In Progress</option>
                                <option value="resolved">Resolved</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="description">Description *</label>
                        <textarea id="description" name="description" rows="5" required placeholder="Describe the bug, steps to reproduce, expected vs actual behavior..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="assignee">Assign To</label>
                        <select id="assignee" name="assignee">
                            <option value="Unassigned">Unassigned</option>
                            <option value="Alex">Alex</option>
                            <option value="Sarah">Sarah</option>
                            <option value="Mike">Mike</option>
                            <option value="Emma">Emma</option>
                        </select>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">Cancel</button>
                        <button type="submit" class="btn btn-primary">Submit Bug</button>
                    </div>
                </form>
                <div id="formMessage" class="form-message"></div>
            </div>
        </main>
    </div>

    <script src="js/data.js"></script>
    <script src="js/report.js"></script>
</body>
</html>
